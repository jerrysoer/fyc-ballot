name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Remove server-only routes (API + admin + dynamic icon)
        run: rm -rf src/app/api src/app/admin src/middleware.ts src/app/icon.tsx
      - run: npm run build
        env:
          BUILD_MODE: static
          NEXT_PUBLIC_API_URL: https://fyc-ballot-api.vercel.app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - id: deployment
        uses: actions/deploy-pages@v4
